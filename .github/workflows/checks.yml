name: checks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1"   # weekly, Monday 09:00 UTC, to catch link rot
  workflow_dispatch:

jobs:
  links:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # accept bot-block/rate-limit/odd-content codes and be patient: volatile third-party
          # x402 endpoints flake, so real link rot is the only thing that should fail CI
          args: "--no-progress --max-concurrency 8 --timeout 30 --max-retries 2 --accept 200,206,403,415,429 './**/*.md'"
          fail: true
